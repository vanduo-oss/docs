<section id="[component-name]">
    <h4 class="demo-title"><i class="ph ph-[icon]"></i>[Component Name]</h4>
    <p class="vd-mb-8">[Brief description of the component and its purpose.]</p>

    <!-- Rendered Component Section -->
    <div class="vd-row">
        <div class="vd-col-12">
            <div class="vd-card vd-card-glow demo-card">
                <div class="vd-card-header">
                    <h4>[Component Demo]</h4>
                </div>
                <div class="vd-card-body">
                    <!-- Rendered component demo goes here -->
                    [Component HTML rendering]
                </div>
            </div>
        </div>
    </div>

    <!-- Code Snippet Section -->
    <div class="vd-code-snippet" data-collapsible>
        <button class="vd-code-snippet-toggle" aria-expanded="false">
            <span class="vd-code-snippet-toggle-icon"></span>
            <span>View Code</span>
        </button>
        <div class="vd-code-snippet-content">
            <div class="vd-code-snippet-header">
                <div class="vd-code-snippet-tabs" role="tablist">
                    <button class="vd-code-snippet-tab is-active" data-lang="html">HTML</button>
                    <button class="vd-code-snippet-tab" data-lang="css">CSS</button>
                    <button class="vd-code-snippet-tab" data-lang="js">JS</button>
                </div>
                <button class="vd-code-snippet-copy" aria-label="Copy code">
                    <span class="vd-code-snippet-copy-icon"></span>
                    <span class="vd-code-snippet-copy-text">Copy</span>
                </button>
            </div>
            <div class="vd-code-snippet-body">
                <pre class="vd-code-snippet-pane is-active" data-lang="html"><code>[HTML code snippet]</code></pre>
                <pre class="vd-code-snippet-pane" data-lang="css"><code>[CSS code snippet]</code></pre>
                <pre class="vd-code-snippet-pane" data-lang="js"><code>[JS code snippet]</code></pre>
            </div>
        </div>
    </div>

    <!-- Explanation and API Reference Section -->
    <div class="vd-row">
        <div class="vd-col-12">
            <div class="vd-card vd-card-glow demo-card">
                <div class="vd-card-header">
                    <h4><i class="ph ph-list-dashes mr-2" style="color: var(--color-primary);"></i>Class Reference</h4>
                </div>
                <div class="vd-card-body">
                    <div class="vd-table-responsive">
                        <table class="vd-table vd-table-hover">
                            <thead>
                                <tr>
                                    <th>Class</th>
                                    <th>Description</th>
                                    <th>Type</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code>.[component-base-class]</code></td>
                                    <td>[Description of the base class]</td>
                                    <td>Base</td>
                                </tr>
                                <!-- Additional rows for other classes -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Additional Sections as Needed -->
    <!-- Example: API Reference, Best Practices, etc. -->
</section>
