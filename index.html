    <!-- Vanduo Framework CSS (local for development, pinned CDN for production) -->
    <script>
        (function () {
            var frameworkVersion = '1.4.2';
            var params = new URLSearchParams(window.location.search);
            var forcedMode = params.get('vanduo-assets');
            var isLocalPreview = window.location.protocol === 'file:'
                || window.location.hostname === 'localhost'
                || window.location.hostname === '127.0.0.1';
            var mode = forcedMode === 'cdn' || forcedMode === 'local'
                ? forcedMode
                : (isLocalPreview ? 'local' : 'cdn');
            var basePath = mode === 'local'
                ? './dist'
                : 'https://cdn.jsdelivr.net/npm/@vanduo-oss/framework@1.4.2/dist';
            var assetQuery = mode === 'local'
                ? '?dev=' + Date.now()
                : '';

            window.__VANDUO_FRAMEWORK_ASSET_MODE = mode;
            window.__VANDUO_FRAMEWORK_ASSETS = {
                mode: mode,
                expectedVersion: frameworkVersion,
                cssHref: basePath + '/vanduo.min.css' + assetQuery,
                jsSrc: basePath + '/vanduo.min.js' + assetQuery
            };
            window.__VANDUO_TEMPLATES_BASE_URL = (params.get('vanduo-templates')
                || (isLocalPreview ? 'http://localhost:8788' : 'https://templates.vanduo.dev'))
                .replace(/\/+$/, '');
            document.documentElement.setAttribute('data-framework-assets', mode);
        })();
    </script>

    <!-- ── Vanduo Framework JS (local for development, pinned CDN for production) ───────── -->
    <script>
        (function () {
            var assetState = window.__VANDUO_FRAMEWORK_ASSETS;
            var LOCAL_ASSET_BASE = './dist';

            if (!assetState) {
                console.error('Vanduo asset configuration is missing.');
                return;
            }

            function switchToLocalAssets(reason) {
                var frameworkCss = document.getElementById('vanduo-framework-css');
                var cacheBust = '?fallback=' + Date.now();

                assetState.mode = 'local-fallback';
                assetState.cssHref = LOCAL_ASSET_BASE + '/vanduo.min.css' + cacheBust;
                assetState.jsSrc = LOCAL_ASSET_BASE + '/vanduo.min.js' + cacheBust;

                if (frameworkCss) {
                    frameworkCss.href = assetState.cssHref;
                    frameworkCss.setAttribute('data-framework-mode', assetState.mode);
                }

                console.warn(
                    'Switching framework assets to local bundle' + (reason ? ' (' + reason + ')' : '') + '.'
                );
            }

            function loadedFrameworkVersion() {
                if (window.Vanduo && typeof window.Vanduo.version === 'string') {
                    return window.Vanduo.version;
                }
                return null;
            }

            function parseFrameworkVersionFromSource(sourceText) {
                var match = sourceText.match(/Vanduo\s+v([0-9]+\.[0-9]+\.[0-9]+)/i);
                return match ? match[1] : null;
            }

            function preflightCdnVersion() {
                if (assetState.mode !== 'cdn' || !assetState.expectedVersion) {
                    return Promise.resolve();
                }

                return fetch(assetState.jsSrc, { cache: 'no-store' })
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error('HTTP ' + response.status);
                        }
                        return response.text();
                    })
                    .then(function (sourceText) {
                        var resolvedVersion = parseFrameworkVersionFromSource(sourceText);
                        if (resolvedVersion && resolvedVersion !== assetState.expectedVersion) {
                            console.warn(
                                'CDN framework mismatch before load: expected v'
                                + assetState.expectedVersion
                                + ', got v'
                                + resolvedVersion
                                + '.'
                            );
                            switchToLocalAssets('cdn-version-mismatch');
                        }
                    })
                    .catch(function (error) {
                        console.warn('Framework CDN preflight skipped:', error.message);
                    });
            }

            function verifyFrameworkVersion() {
                var expected = assetState.expectedVersion;
                var loaded = loadedFrameworkVersion();

                if (!expected || !loaded) {
                    return Promise.resolve();
                }

                if (expected === loaded) {
                    return Promise.resolve();
                }

                console.warn('Framework version mismatch: expected v' + expected + ', got v' + loaded + '.');

                if (assetState.mode === 'cdn') {
                    switchToLocalAssets('runtime-version-mismatch');
                    return loadScript(assetState.jsSrc, 'data-framework-js', assetState.mode);
                }

                return Promise.reject(new Error('Loaded framework version does not match expected release.'));
            }

            function loadScript(src, attributeName, attributeValue) {
                return new Promise(function (resolve, reject) {
                    var script = document.createElement('script');
                    script.src = src;
                    if (attributeName) {
                        script.setAttribute(attributeName, attributeValue || '');
                    }
                    script.onload = function () {
                        resolve();
                    };
                    script.onerror = function () {
                        reject(new Error('Failed to load script: ' + src));
                    };
                    document.body.appendChild(script);
                });
            }

            function loadFramework() {
                return loadScript(assetState.jsSrc, 'data-framework-js', assetState.mode)
                    .then(function () {
                        return verifyFrameworkVersion();
                    });
            }

            function loadAppScripts() {
                var docsScriptVersion = '?v=' + (assetState.expectedVersion || 'dev') + '-docs-9';
                return loadScript('js/lazy-loader.js' + docsScriptVersion)
                    .then(function () {
                        return loadScript('js/section-cache.js' + docsScriptVersion);
                    })
                    .then(function () {
                        return loadScript('js/vanduo-charts.iife.js' + docsScriptVersion);
                    })
                    .then(function () {
                        return loadScript('js/vanduo-flowchart.iife.js' + docsScriptVersion);
                    })
                    .then(function () {
                        return loadScript('js/app.js' + docsScriptVersion);
                    });
            }

            preflightCdnVersion()
                .then(function () {
                    return loadFramework();
                })
                .then(function () {
                    return loadAppScripts();
                })
                .catch(function (error) {
                    if (assetState.mode === 'cdn') {
                        switchToLocalAssets('cdn-load-failed');
                        loadFramework()
                            .then(function () {
                                return loadAppScripts();
                            })
                            .catch(function (fallbackError) {
                                console.error(fallbackError.message);
                            });
                        return;
                    }

                    console.error(error.message);
                });
        })();
    </script>
