    <!-- Vanduo Framework CSS (local for development, pinned CDN for production) -->
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var forcedMode = params.get('vanduo-assets');
            var isLocalPreview = window.location.protocol === 'file:'
                || window.location.hostname === 'localhost'
                || window.location.hostname === '127.0.0.1';
            var mode = forcedMode === 'cdn' || forcedMode === 'local'
                ? forcedMode
                : (isLocalPreview ? 'local' : 'cdn');
            var basePath = mode === 'local'
                ? './dist'
                : 'https://cdn.jsdelivr.net/gh/vanduo-oss/framework@v1.3.4/dist';

            window.__VANDUO_FRAMEWORK_ASSET_MODE = mode;
            window.__VANDUO_FRAMEWORK_ASSETS = {
                mode: mode,
                cssHref: basePath + '/vanduo.min.css',
                jsSrc: basePath + '/vanduo.min.js'
            };
            document.documentElement.setAttribute('data-framework-assets', mode);
        })();
    </script>
    <link id="vanduo-framework-css" rel="stylesheet">
    <script>
        (function () {
            var frameworkCss = document.getElementById('vanduo-framework-css');
            if (!frameworkCss || !window.__VANDUO_FRAMEWORK_ASSETS) {
                return;
            }

            frameworkCss.href = window.__VANDUO_FRAMEWORK_ASSETS.cssHref;
            frameworkCss.setAttribute('data-framework-css', window.__VANDUO_FRAMEWORK_ASSET_MODE);
        })();
    </script>

    <!-- ── Vanduo Framework JS (local for development, pinned CDN for production) ───────── -->
    <script>
        (function () {
            var assetState = window.__VANDUO_FRAMEWORK_ASSETS;

            if (!assetState) {
                console.error('Vanduo asset configuration is missing.');
                return;
            }

            function loadScript(src, attributeName, attributeValue) {
                return new Promise(function (resolve, reject) {
                    var script = document.createElement('script');
                    script.src = src;
                    if (attributeName) {
                        script.setAttribute(attributeName, attributeValue || '');
                    }
                    script.onload = function () {
                        resolve();
                    };
                    script.onerror = function () {
                        reject(new Error('Failed to load script: ' + src));
                    };
                    document.body.appendChild(script);
                });
            }

            loadScript(assetState.jsSrc, 'data-framework-js', assetState.mode)
                .then(function () {
                    return loadScript('js/lazy-loader.js');
                })
                .then(function () {
                    return loadScript('js/app.js');
                })
                .catch(function (error) {
                    console.error(error.message);
                });
        })();
    </script>
